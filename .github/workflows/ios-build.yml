name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'unsigned'
        options:
          - unsigned
          - signed

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HAS_APP_STORE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Capacitor CLI
        run: |
          npm install -g @capacitor/cli

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Web App
        run: |
          cd frontend
          npm run build

      - name: Setup Capacitor iOS
        run: |
          cd frontend
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd frontend
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install --repo-update
            echo "=== After pod install ==="
            ls -la
          elif [ -f ios/Podfile ]; then
            cd ios && pod install --repo-update
            echo "=== After pod install ==="
            ls -la
          else
            echo "Podfile not found, checking structure..."
            find ios -name Podfile 2>/dev/null || echo "No Podfile found"
            ls -laR ios/ 2>/dev/null || echo "ios does not exist"
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      # ========== 未签名构建（开发测试用） ==========
      - name: Build iOS Archive (unsigned)
        if: github.event.inputs.build_type != 'signed'
        run: |
          cd frontend/ios/App
          if [ -f App.xcworkspace ]; then
            echo "Building with workspace..."
            xcodebuild archive \
              -workspace App.xcworkspace \
              -scheme App \
              -archivePath ./build/App.xcarchive \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Workspace not found, trying project..."
            ls -la
            xcodebuild archive \
              -project App.xcodeproj \
              -scheme App \
              -archivePath ./build/App.xcarchive \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Upload Unsigned Archive
        if: github.event.inputs.build_type != 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-archive
          path: frontend/ios/App/build/App.xcarchive
          retention-days: 7

      - name: Export Unsigned IPA
        if: github.event.inputs.build_type != 'signed'
        run: |
          echo "Manually packaging unsigned IPA..."
          cd frontend/ios/App/build
          mkdir -p Payload
          APP_PATH=$(find App.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in archive"
            find App.xcarchive -name "*.app" 2>/dev/null || echo "No .app found"
            ls -la App.xcarchive/Products/Applications/ 2>/dev/null || echo "No Applications dir"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r App.ipa Payload
          echo "IPA created: $(ls -lh App.ipa)"

      - name: Upload Unsigned IPA
        if: github.event.inputs.build_type != 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: frontend/ios/App/build/App.ipa
          retention-days: 7

      # ========== 签名构建（TestFlight 分发用） ==========
      - name: Import Signing Certificate
        if: github.event.inputs.build_type == 'signed'
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install Provisioning Profile
        if: github.event.inputs.build_type == 'signed'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision

      - name: Build iOS Archive (signed)
        if: github.event.inputs.build_type == 'signed'
        run: |
          cd frontend/ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath ./build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY }}"

      - name: Export IPA
        if: github.event.inputs.build_type == 'signed'
        run: |
          cd frontend/ios/App
          mkdir -p build/export
          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ../../ExportOptions.plist

      - name: Upload IPA
        if: github.event.inputs.build_type == 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: frontend/ios/App/build/export/*.ipa
          retention-days: 30

      # ========== 上传到 TestFlight（可选） ==========
      - name: Upload to TestFlight
        if: github.event.inputs.build_type == 'signed' && env.HAS_APP_STORE_KEY == 'true'
        uses: Apple-Actions/upload-testflight-build@v1
        with:
          app-path: frontend/ios/App/build/export/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_KEY }}